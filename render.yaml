services:
  - type: web
    name: proctify-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3001
      - key: ADMIN_PASSWORD
        sync: false   # Set this manually in the Render dashboard
      - key: MONGODB_URI
        sync: false   # Set this manually in the Render dashboard
      - key: ALLOWED_ORIGIN
        sync: false   # Set to your Netlify URL once you have it, e.g. https://your-app.netlify.app
    # No SMTP_* variables: Render's free tier blocks outbound SMTP ports
    # (25/465/587) entirely as a platform policy (see README "Email
    # Verification" section). Leaving these unset means the app automatically
    # falls back to displaying verification codes on-screen instead of
    # emailing them — the correct behavior for a free-tier deployment.
    # No persistent disk: Render's disks are a paid-only feature and require a
    # card on file even on the free plan. We don't need one anyway — MongoDB
    # Atlas is the production data store, not the local server/data.json
    # fallback. If MONGODB_URI is ever unset, data.json still works, it just
    # won't persist across deploys/restarts (acceptable for a demo project).
