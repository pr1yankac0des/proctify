server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers (mirrors netlify.toml) ───────────────────────────────
    # 'wasm-unsafe-eval' is required for MediaPipe's WASM-based vision models.
    # connect-src allows https: broadly because code execution calls the public
    # Piston API (emkc.org) in addition to our own backend.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), fullscreen=(self), geolocation=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/wasm;
    gzip_min_length 1024;

    # ─── Long-lived caching for MediaPipe WASM + ML models ────────────────────
    location /mediapipe/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /models/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ─── API proxy ─────────────────────────────────────────────────────────────
    # The frontend calls relative '/api/...' paths; nginx forwards them to the
    # API container by its Docker Compose service name ("api").
    location /api/ {
        proxy_pass http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── SPA fallback ──────────────────────────────────────────────────────────
    # React Router handles all non-file, non-API routes client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
